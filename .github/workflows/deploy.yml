# .github/workflows/deploy.yml
# GitHub Actions CI/CD pipeline – alternative to Cloud Build.
#
# Triggers on every push to `main`.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   GCP_SA_KEY        - Service account JSON key with roles:
#                         roles/run.admin
#                         roles/storage.admin
#                         roles/iam.serviceAccountUser
#   GEMINI_API_KEY    - Your Gemini API key

name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0581494231
  SERVICE_NAME: student-ai-automation
  REGION: us-central1
  IMAGE: gcr.io/gen-lang-client-0581494231/student-ai-automation

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up Cloud SDK ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 4. Configure Docker to use gcloud credentials ──────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # ── 5. Build Docker image ───────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to Google Container Registry ───────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ──────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production,PYTHONUNBUFFERED=1,PORT=3000,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project ${{ env.PROJECT_ID }}

      # ── 8. Retrieve and verify the service URL ─────────────────────────────
      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "SERVICE_URL=${SERVICE_URL}" >> $GITHUB_ENV
          echo "Deployed to: ${SERVICE_URL}"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" || true)
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed (HTTP ${STATUS})."
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${STATUS}. Retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts."
          exit 1

      # ── 9. Post deployment summary ─────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "   Service : ${{ env.SERVICE_NAME }}"
          echo "   Region  : ${{ env.REGION }}"
          echo "   URL     : ${{ env.SERVICE_URL }}"
