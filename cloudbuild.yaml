# ─────────────────────────────────────────────────────────────────────────────
# cloudbuild.yaml
# Google Cloud Build CI/CD pipeline for the Ridhi Command Center
#
# Triggers automatically on push to `main`.
# Substitutions (set in Cloud Build trigger configuration):
#   _SERVICE_NAME  – Cloud Run service name  (default: ridhi-command-center)
#   _REGION        – GCP region              (default: us-central1)
# ─────────────────────────────────────────────────────────────────────────────
substitutions:
  _SERVICE_NAME: ridhi-command-center
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  # Use a faster machine type for builds with Node.js compilation
  machineType: E2_HIGHCPU_8

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .

  # ── Step 2: Push the image to Container Registry ───────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}
    waitFor:
      - build

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-env-vars=NODE_ENV=production,BACKEND_PORT=8000
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
    waitFor:
      - push

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

timeout: "1200s"
