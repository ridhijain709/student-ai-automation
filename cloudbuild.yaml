# cloudbuild.yaml
# Google Cloud Build CI/CD pipeline for student-ai-automation.
#
# Triggers on every push to the `main` branch (configure in the Cloud Console
# or via `gcloud builds triggers create github`).
#
# Required Cloud Build substitution variables (set in trigger or via --substitutions):
#   _REGION           - Cloud Run region            (default: us-central1)
#   _SERVICE_NAME     - Cloud Run service name      (default: student-ai-automation)
#   _GEMINI_API_KEY   - Gemini API key (use Secret Manager binding for production)

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: student-ai-automation
  _IMAGE: gcr.io/$PROJECT_ID/$_SERVICE_NAME

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --platform=linux/amd64
      - --cache-from=$_IMAGE:latest
      - -t
      - $_IMAGE:$SHORT_SHA
      - -t
      - $_IMAGE:latest
      - .

  # ── Step 2: Push the versioned tag ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [build]
    args:
      - push
      - $_IMAGE:$SHORT_SHA

  # ── Step 3: Push the `latest` tag ───────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args:
      - push
      - $_IMAGE:latest

  # ── Step 4: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=NODE_ENV=production,PYTHONUNBUFFERED=1,PORT=3000
      # Bind the Gemini API key from Secret Manager instead of passing it as plain text.
      # Requires the Cloud Build SA to have roles/secretmanager.secretAccessor.
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
      - --project=$PROJECT_ID

  # ── Step 5: Verify health endpoint ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: health-check
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe $_SERVICE_NAME \
          --region=$_REGION \
          --project=$PROJECT_ID \
          --format='value(status.url)')
        echo "Service URL: $${SERVICE_URL}"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}/health" || true)
          if [ "$${STATUS}" = "200" ]; then
            echo "Health check passed."
            exit 0
          fi
          echo "Attempt $${i}: HTTP $${STATUS}. Retrying in 10s..."
          sleep 10
        done
        echo "Health check failed after 5 attempts."
        exit 1

# Make the built images available to subsequent steps and Cloud Run
images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

timeout: 1200s
