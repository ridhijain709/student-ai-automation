services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Default to sqlite for demo unless overridden in .env
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/ridhi.db}
      - SHEETS_MODE=${SHEETS_MODE:-mock}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      - GOOGLE_SHEETS_SHEET_NAME=${GOOGLE_SHEETS_SHEET_NAME:-Leads}
      - GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-}
    volumes:
      - ./data:/app/data

